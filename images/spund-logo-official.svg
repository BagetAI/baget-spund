<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="100%" height="100%">
  <!-- Definition for reusable styles and gradients if needed -->
  <defs>
    <style>
      .bg { fill: none; }
      .text-spund { font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; font-weight: 800; font-size: 64px; fill: #1A1C1E; letter-spacing: 0.12em; }
      .loop-outer { fill: none; stroke: #1A1C1E; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .loop-accent { fill: none; stroke: #10B981; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .channel-line { fill: none; stroke: #1A1C1E; stroke-width: 6; stroke-dasharray: 2 12; stroke-linecap: round; }
      .plug-slice { fill: #FDFBF7; }
    </style>
  </defs>

  <!-- Background Canvas (Transparent) -->
  <rect width="500" height="200" class="bg" />

  <g transform="translate(10, 0)">
    <!-- Closed-Loop Tap Icon (Left Side) -->
    <g transform="translate(60, 100)">
      <!-- Left Interlocking Loop -->
      <circle cx="-25" cy="0" r="38" class="loop-outer" />
      <!-- Right Interlocking Loop -->
      <circle cx="25" cy="0" r="38" class="loop-outer" />
      
      <!-- Inner Shared Overlap Highlight (BSR Green Loop Accent) -->
      <path d="M 0,-28 A 38,38 0 0,1 25,0 A 38,38 0 0,1 0,28 A 38,38 0 0,1 -25,0 A 38,38 0 0,1 0,-28" class="loop-accent" stroke-dasharray="80 120" />
      
      <!-- Vertical Flow Channel (High Pressure Flow Line) -->
      <line x1="0" y1="-65" x2="0" y2="65" class="loop-outer" />
      <line x1="0" y1="-45" x2="0" y2="45" stroke="#FDFBF7" stroke-width="8" stroke-linecap="round" />
      <line x1="0" y1="-35" x2="0" y2="35" stroke="#10B981" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- Wordmark SPUND (Right Side) -->
    <g transform="translate(160, 120)">
      <!-- S -->
      <text x="0" y="0" class="text-spund">S</text>
      <!-- P -->
      <text x="58" y="0" class="text-spund">P</text>
      
      <!-- U with custom mechanical slice representing the Bung/Spund stopper insertion -->
      <g transform="translate(118, 0)">
        <text x="0" y="0" class="text-spund">U</text>
        <!-- Razor-thin vertical slice -->
        <rect x="25" y="-60" width="6" height="70" class="plug-slice" />
        <!-- Accent flow dot within the U slice -->
        <circle cx="28" cy="-25" r="4" fill="#10B981" />
      </g>
      
      <!-- N -->
      <text x="195" y="0" class="text-spund">N</text>
      <!-- D -->
      <text x="260" y="0" class="text-spund">D</text>
    </g>
  </g>
</svg>
